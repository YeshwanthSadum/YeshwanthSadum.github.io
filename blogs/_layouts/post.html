---
layout: default
---

<article class="post">
  <header class="post-header">
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.tags %}
        {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
        {% endfor %}
      {% endif %}
    </div>
    <!-- Removed duplicate post-title and post-subtitle -->
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <footer class="post-footer">
    <div class="post-share">
      <p>Found this useful? Share it.</p>
      <a class="share-btn" href="https://www.linkedin.com/sharing/share-offsite/?url={{ page.url | absolute_url | url_encode }}" target="_blank" rel="noopener">Share on LinkedIn</a>
      <a class="share-btn" href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&url={{ page.url | absolute_url | url_encode }}" target="_blank" rel="noopener">Share on X</a>
    </div>
    <div class="post-nav">
      <a href="{{ '/' | relative_url }}" class="back-link">← All writing</a>
      <a href="{{ '/blogs/' | relative_url }}" class="back-link">← Back to blog list</a>
    </div>
  </footer>
</article>
