<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>

  <header class="site-header">
    <nav class="nav-inner">
      {% if page.title %}
        <div class="site-logo">
          <span class="blog-title">{{ page.title }}</span>
          {% if page.subtitle %}
            <span class="blog-subtitle">{{ page.subtitle }}</span>
          {% endif %}
        </div>
      {% endif %}
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Writing</a>
        <a href="https://github.com/YeshwanthSadum" target="_blank" rel="noopener">GitHub</a>
        <a href="https://linkedin.com/in/yeshwanthsadum" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </nav>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>© {{ 'now' | date: "%Y" }} Yeshwanth &nbsp;·&nbsp; Writing on AI systems, agents, and platform engineering.</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

  <style>
    .blog-title {
      font-size: 1.5rem;
      font-weight: bold;
    }
    .blog-subtitle {
      font-size: 1rem;
      color: #666;
      display: block;
      margin-top: 0.2rem;
    }
  </style>
</body>
</html>
